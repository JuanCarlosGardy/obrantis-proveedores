!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Obrantis | Proveedores y Facturas</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://unpkg.com/dexie/dist/dexie.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.25/jspdf.plugin.autotable.min.js"></script>
</head>
<body>

    <div id="pin-overlay" class="overlay">
        <div class="modal-pin">
            <h2>Acceso Privado</h2>
            <input type="password" id="pin-input" placeholder="Introduce PIN" maxlength="4" inputmode="numeric">
            <button onclick="verificarPIN()">Entrar</button>
        </div>
    </div>

    <header class="app-header">
        <h1>Gestión Barquilla</h1>
        <nav class="tabs">
            <button class="tab-btn active" onclick="switchTab('proveedores')">Proveedores</button>
            <button class="tab-btn" onclick="switchTab('facturas')">Facturas</button>
            <button class="tab-btn" onclick="switchTab('informes')">Informes</button>
        </nav>
    </header>

    <main id="app-content">
        <section id="tab-proveedores" class="tab-content active">
            <div class="actions">
                <input type="text" id="search-prov" placeholder="Buscar proveedor..." oninput="renderProveedores()">
                <button class="btn-add" onclick="openModal('modal-proveedor')">+ Nuevo Proveedor</button>
            </div>
            <div id="lista-proveedores" class="grid-list"></div>
        </section>

        <section id="tab-facturas" class="tab-content">
            <div class="actions">
                <input type="month" id="filter-factura-month" onchange="renderFacturas()">
                <button class="btn-add" onclick="openModal('modal-factura')">+ Nueva Factura</button>
            </div>
            <div id="lista-facturas" class="grid-list"></div>
        </section>

        <section id="tab-informes" class="tab-content">
            <div class="report-controls">
                <select id="report-type">
                    <option value="mensual">Mensual</option>
                    <option value="trimestral">Trimestral</option>
                </select>
                <label style="display:block; margin-bottom:5px; font-weight:bold; color:#2c3e50;">Selecciona un día del mes:</label>
<input type="date" id="report-date" name="fecha_informe" style="width:100%; margin-bottom:10px; padding:12px; border:2px solid #d35400; border-radius:5px; font-size:16px; -webkit-appearance: listbox;">
                <button onclick="generarInforme()">Generar Informe</button>
                <button onclick="generarInformeTrimestral()" style="background:#8e44ad; color:white; width:100%; padding:12px; margin-top:10px; border:none; border-radius:5px; font-weight:bold; cursor:pointer;">
    Generar Informe TRIMESTRAL
</button>
            </div>
            <div id="report-results"></div>
            <div class="backup-zone" style="margin-top:20px; border-top: 1px solid #ccc; padding-top:20px; background:#f9f9f9; padding:15px; border-radius:8px;">
    <h4 style="margin-bottom:10px; color:#2c3e50;">Copia de Seguridad</h4>
    <p style="font-size:0.8rem; color: #666; margin-bottom:15px;">Para pasar datos al iPhone: Pulsa Exportar y envíate el archivo por WhatsApp.</p>
    <div style="display:flex; gap:10px;">
        <button onclick="exportarDatos()" style="background:#27ae60; color:white; flex:1; padding:10px; border-radius:5px; border:none; font-weight:bold;">Exportar Datos</button>
        <button onclick="document.getElementById('import-file').click()" style="background:#2980b9; color:white; flex:1; padding:10px; border-radius:5px; border:none; font-weight:bold;">Importar Datos</button>
    </div>
    <input type="file" id="import-file" style="display:none" onchange="importarDatos(this)">
</div>

        </section>
    </main>

    <div id="modal-proveedor" class="modal">
        <div class="modal-body">
            <h3>Ficha Proveedor</h3>
            <form id="form-proveedor">
                <input type="hidden" id="prov-id">
                <input type="text" id="prov-nombre" placeholder="Nombre Comercial" required>
                <input type="text" id="prov-razon" placeholder="Razón Social">
                <input type="text" id="prov-cif" placeholder="CIF/NIF">
                <input type="email" id="prov-email" placeholder="Email">
                <input type="tel" id="prov-tel" placeholder="Teléfono">
                <select id="prov-cat">
                    <option value="Materiales">Materiales</option>
                    <option value="Subcontrata">Subcontrata</option>
                    <option value="Suministros">Suministros</option>
                    <option value="Otros">Otros</option>
                </select>
                <textarea id="prov-notas" placeholder="Notas..."></textarea>
                <div class="modal-footer">
                    <button type="button" class="btn-cancel" onclick="closeModal('modal-proveedor')">Cancelar</button>
                    <button type="submit" class="btn-save">Guardar</button>
                </div>
            </form>
        </div>
    </div>

   <div id="modal-factura" class="modal" style="display:none; position:fixed; z-index:1000; left:0; top:0; width:100%; height:100%; background:rgba(0,0,0,0.6);">
    <div class="modal-content" style="background:white; margin:5% auto; padding:20px; width:90%; max-width:500px; border-radius:10px; box-shadow: 0 5px 15px rgba(0,0,0,0.3);">
        <h3 style="color:#2c3e50; border-bottom:2px solid #d35400; padding-bottom:10px;">Registro Factura - Barquilla</h3>
        <form id="form-factura" style="display:flex; flex-direction:column; gap:12px; margin-top:15px;">
            
            <select id="fact-prov" style="padding:12px; border-radius:5px; border:1px solid #ccc;" required>
                <option value="">Seleccionar Proveedor...</option>
            </select>
            
            <input type="date" id="fact-fecha" style="padding:12px; border-radius:5px; border:1px solid #ccc;" required>
            
            <input type="text" id="fact-num" placeholder="Nº de Factura / Ticket" style="padding:12px; border-radius:5px; border:1px solid #ccc;">
            
            <input type="text" id="fact-concepto" placeholder="Concepto (ej: LUZ, AGUA, CARNE)" style="padding:12px; border-radius:5px; border:1px solid #ccc;">
            
            <div style="display: flex; flex-direction: column; gap: 8px; background: #f9f9f9; padding: 10px; border-radius: 5px;">
    <label style="font-size: 12px; font-weight: bold;">Desglose por IVA:</label>
    <input type="number" id="base-21" step="0.01" placeholder="Base al 21%" oninput="calcTotal()">
    <input type="number" id="base-10" step="0.01" placeholder="Base al 10%" oninput="calcTotal()">
    <input type="number" id="base-4" step="0.01" placeholder="Base al 4%" oninput="calcTotal()">
</div>
<input type="number" id="fact-total" placeholder="Total Factura" readonly style="font-weight:bold; background:#e8f4fd;">

                <div style="background:#eee; padding:10px; border-radius:5px;">
                <label style="font-size:12px; display:block; margin-bottom:5px;">Adjunto (Imagen/PDF):</label>
                <input type="file" id="fact-adjunto" accept="image/*,application/pdf">
            </div>
            
            <div style="display:flex; gap:10px; margin-top:10px;">
                <button type="button" onclick="closeModal('modal-factura')" style="flex:1; padding:12px; background:#95a5a6; color:white; border:none; border-radius:5px; cursor:pointer;">Cancelar</button>
                <button type="submit" style="flex:1; padding:12px; background:#27ae60; color:white; border:none; border-radius:5px; font-weight:bold; cursor:pointer;">Guardar Factura</button>
            </div>
        </form>
    </div>
</div>



    <script src="script.js"></script>
</body>
</html>
